# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: cinnamonos
# description will be included in the image's metadata
description: This is my personal OS image.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/base-main
image-version: latest # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: dnf
    repos:
      copr:
        - atim/starship
    group-install:
      packages:
        - cinnamon-desktop
        - printing
    install:
      packages:
        # --- Cinnamon display manager environment stack ---
        - lightdm
        - lightdm-gtk
        - slick-greeter
        # --- Essential Mint themes and icons for a polished Cinnamon experience ---
        - mint-themes
        - mint-y-icons
        - mint-x-icons
        - desktop-backgrounds-compat
        # --- Extras ---
        - network-manager-applet
        - volumeicon
        - gnome-terminal
        - blueman
        - system-config-printer
        - distrobox
        - fish
        - starship
        - vim
        - fastfetch
        - git
    remove:
      packages:
        - gnome-calculator
        - file-roller
        - thunderbird

# Copy system configuration files from files/system into image root.
  - type: files
    files:
      - source: system
        destination: /

# Add this to pull the Brew OCI container
  - type: containerfile
    snippets:
      - COPY --from=ghcr.io/ublue-os/brew:latest /system_files /

# This configures LightDM and forces the system to boot into a graphical interface
  - type: systemd
    system:
      enabled:
        - lightdm.service
        # uupd handles bootc, brew, flatpak, and distrobox updates.
        - uupd.timer
      disabled:
        # Disable rpm-ostree auto path to avoid overlapping update mechanisms.
        - rpm-ostreed-automatic.timer
        
  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - com.brave.Browser
          - com.github.ryonakano.pinit
          - com.github.tchx84.Flatseal
          - org.gnome.Lollypop
          - io.github.kolunmi.Bazaar
          - org.gnome.Shotwell
          - io.github.celluloid_player.Celluloid
      - scope: user # Also add Flathub user repo, but no user packages

  - type: signing # this sets up the proper policy & signing files for signed images to work fully