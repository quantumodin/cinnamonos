# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# Final published image name: ghcr.io/<namespace>/cinnamon:<image-version>
name: cinnamonos

description: >-
  Universal Blue based Cinnamon image built with BlueBuild.

base-image: ghcr.io/ublue-os/base-main
image-version: latest

modules:
  # Core OS package layering and removals.
  - type: dnf
    repos:
      copr:
        - ublue-os/packages
        - atim/starship
    group-install:
      with-optional: true
      packages:
        - cinnamon-desktop
        - printing
    install:
      packages:
        # Essential Mint themes and icons for a polished Cinnamon experience.
        - mint-themes
        - mint-y-icons
        - mint-x-icons
        - desktop-backgrounds-compat
        # Runtime tooling expected in this image profile.
        - distrobox
        - uupd
        # Extras
        - network-manager-applet
        - volumeicon
        - gnome-terminal
        - blueman
        - system-config-printer
        - fish
        - starship
        - vim
        - fastfetch
        - git

    remove:
      packages:
        # Replaced by curated Flatpak defaults below.
        - gnome-calculator
        - file-roller
        - simple-scan
        - thunderbird

  # Copy system configuration files from files/system into image root.
  - type: files
    files:
      - source: system
        destination: /

  # Set systemd default target to boot into a graphical GUI environment
  - type: containerfile
    snippets:
      - RUN ln -sf /usr/lib/systemd/system/graphical.target /etc/systemd/system/default.target # <-- ADDED: Forces GUI boot

  # Add this to pull the Brew OCI container
  - type: containerfile
    snippets:
      - COPY --from=ghcr.io/ublue-os/brew:latest /system_files /

  # Seed default system-wide Flatpaks from Flathub at first boot.
  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        repo:
          name: flathub
          title: Flathub (System)
          url: https://dl.flathub.org/repo/flathub.flatpakrepo
        install:
          - com.brave.Browser
          - com.github.ryonakano.pinit
          - com.github.tchx84.Flatseal
          - org.gnome.Lollypop
          - io.github.kolunmi.Bazaar
          - org.gnome.Shotwell
          - io.github.celluloid_player.Celluloid

  # Enable/disable system services expected for this image.
  - type: systemd
    system:
      enabled:
        # uupd handles bootc, brew, flatpak, and distrobox updates.
        - uupd.timer
      disabled:
        # Disable rpm-ostree auto path to avoid overlapping update mechanisms.
        - rpm-ostreed-automatic.timer

  # Sign published OCI image using repo cosign configuration.
  - type: signing